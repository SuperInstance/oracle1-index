<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 Oracle1 Index — SuperInstance Ecosystem</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
header { text-align: center; padding: 40px 0; }
header h1 { font-size: 2.5em; margin-bottom: 10px; }
header p { color: #8b949e; font-size: 1.1em; }
.search-box { display: flex; gap: 10px; margin: 20px 0 30px; }
.search-box input { flex: 1; padding: 14px 18px; border-radius: 8px; border: 1px solid #30363d; background: #161b22; color: #e6edf3; font-size: 1em; }
.search-box input:focus { outline: none; border-color: #58a6ff; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 20px 0; }
.stat { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; text-align: center; }
.stat .num { font-size: 2em; font-weight: bold; color: #58a6ff; }
.stat .label { color: #8b949e; font-size: 0.85em; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin: 15px 0; }
.filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #30363d; background: #161b22; color: #8b949e; cursor: pointer; font-size: 0.85em; }
.filter-btn.active { background: #1f6feb; color: white; border-color: #1f6feb; }
.repo-grid { display: grid; gap: 10px; }
.repo-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center; }
.repo-card:hover { border-color: #58a6ff; }
.repo-name { font-weight: 600; color: #58a6ff; text-decoration: none; }
.repo-name:hover { text-decoration: underline; }
.repo-desc { color: #8b949e; font-size: 0.9em; }
.repo-lang { font-size: 0.8em; color: #8b949e; }
.repo-origin { font-size: 0.75em; padding: 3px 8px; border-radius: 10px; }
.origin-orig { background: #1a3a2a; color: #3fb950; }
.origin-fork { background: #2a1a3a; color: #a371f7; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75em; background: #21262d; color: #8b949e; margin-left: 5px; }
#count { color: #8b949e; margin: 10px 0; }
footer { text-align: center; padding: 30px 0; color: #484f58; font-size: 0.85em; }
</style>
</head>
<body>
<div class="container">
<header>
<h1>🔮 Oracle1 Index</h1>
<p>Searchable index of the SuperInstance + Lucineer ecosystem</p>
</header>

<div class="stats">
<div class="stat"><div class="num" id="totalRepos">0</div><div class="label">Total Repos</div></div>
<div class="stat"><div class="num" id="totalOrig">0</div><div class="label">Original</div></div>
<div class="stat"><div class="num" id="totalFork">0</div><div class="label">Forked</div></div>
<div class="stat"><div class="num" id="totalCats">0</div><div class="label">Categories</div></div>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="Search repos by name, description, language..." autocomplete="off">
</div>

<div class="filters" id="filters"></div>
<div id="count"></div>
<div class="repo-grid" id="repos"></div>
<footer>Indexed by Oracle1 🔮 • <a href="https://github.com/SuperInstance/oracle1-index" style="color:#58a6ff">GitHub</a></footer>
</div>

<script>
let allRepos = [], categories = [], activeFilter = 'all';

async function load() {
  const [reposRes, catsRes] = await Promise.all([
    fetch('search-index.json').then(r => r.json()),
    fetch('categories.json').then(r => r.json())
  ]);
  allRepos = reposRes;
  categories = catsRes;
  document.getElementById('totalRepos').textContent = allRepos.length;
  document.getElementById('totalOrig').textContent = allRepos.filter(r => !r.fork).length;
  document.getElementById('totalFork').textContent = allRepos.filter(r => r.fork).length;
  document.getElementById('totalCats').textContent = categories.length;
  
  // Build filter buttons
  const filtersEl = document.getElementById('filters');
  filtersEl.innerHTML = '<button class="filter-btn active" data-cat="all">All</button>';
  categories.forEach(c => {
    filtersEl.innerHTML += `<button class="filter-btn" data-cat="${c.key}">${c.title} (${c.count})</button>`;
  });
  filtersEl.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => {
      filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.cat;
      render();
    };
  });
  
  document.getElementById('search').oninput = render;
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = allRepos;
  
  if (q) {
    filtered = filtered.filter(r =>
      r.name.toLowerCase().includes(q) ||
      (r.description || '').toLowerCase().includes(q) ||
      (r.language || '').toLowerCase().includes(q)
    );
  }
  
  if (activeFilter !== 'all') {
    const cat = categories.find(c => c.key === activeFilter);
    // Simple category match by name patterns
    filtered = filtered.filter(r => matchCategory(r, activeFilter));
  }
  
  document.getElementById('count').textContent = `Showing ${filtered.length} repos`;
  
  const reposEl = document.getElementById('repos');
  reposEl.innerHTML = filtered.slice(0, 100).map(r => `
    <div class="repo-card">
      <span class="repo-origin ${r.fork ? 'origin-fork' : 'origin-orig'}">${r.fork ? '🍴 fork' : '⭐ orig'}</span>
      <div>
        <a class="repo-name" href="${r.url}" target="_blank">${r.owner}/${r.name}</a>
        ${r.language ? `<span class="badge">${r.language}</span>` : ''}
        <div class="repo-desc">${r.description || ''}</div>
      </div>
      <span class="repo-lang">${r.updated || ''}</span>
    </div>
  `).join('');
}

function matchCategory(r, cat) {
  const n = r.name.toLowerCase(), d = (r.description || '').toLowerCase();
  const matchers = {
    cocapn: () => n.includes('cocapn'),
    fleet: () => n.startsWith('fleet-'),
    'cuda-core': () => n.startsWith('cuda-'),
    craftmind: () => n.includes('craftmind') || n.includes('minewright'),
    nexus: () => n.startsWith('nexus-'),
    'a2a-protocol': () => n.includes('a2a'),
    'git-agents': () => n.includes('git-agent') || n.includes('git-claw'),
    'constraint-theory': () => n.includes('constraint'),
    flux: () => n.startsWith('flux'),
    equipment: () => n.startsWith('equipment-'),
    'agent-frameworks': () => n.includes('agent-coord') || n.includes('swarm') || n.includes('orchestr'),
    'memory-learning': () => n.includes('memory') || n.includes('bandit') || n.includes('murmur'),
    'marine-fishing': () => n.includes('fishing') || n.includes('marine'),
    infrastructure: () => d.includes('cache') || d.includes('rate limit') || d.includes('task queue'),
    'ai-ml': () => d.includes('vector') || d.includes('rag') || d.includes('embedding'),
    'log-apps': () => n.endsWith('-ai') && n.includes('log'),
    deckboss: () => n.includes('deckboss'),
    'spreadsheet-paradigm': () => n.includes('spreadsheet') || n.includes('polln'),
    trust: () => n.includes('trust') || n.includes('compliance'),
    consensus: () => n.includes('tripartite') || n.includes('consensus') || n.includes('confidence'),
  };
  return matchers[cat] ? matchers[cat]() : false;
}

load();
</script>
</body>
</html>
